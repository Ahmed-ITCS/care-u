services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gph_erp
      POSTGRES_USER: gph
      POSTGRES_PASSWORD: gph_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gph -d gph_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: web
    volumes:
      - ..:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      DB_NAME: gph_erp
      DB_USER: gph
      DB_PASSWORD: gph_secret
      DB_HOST: db
      DB_PORT: "5432"
      DATABASE_URL: postgres://gph:gph_secret@db:5432/gph_erp
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      BASE_DOMAIN: localhost
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery
    volumes:
      - ..:/app
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://gph:gph_secret@db:5432/gph_erp
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: beat
    volumes:
      - ..:/app
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://gph:gph_secret@db:5432/gph_erp
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  channels:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: channels
    volumes:
      - ..:/app
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://gph:gph_secret@db:5432/gph_erp
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
