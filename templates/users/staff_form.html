{% extends "base.html" %}
{% block title %}Add Staff — {{ platform_name }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-primary mb-6">Add Staff Member</h1>
<div class="card bg-base-100 shadow-lg max-w-lg"><div class="card-body">
    <form method="post">{% csrf_token %}
        {% for field in form %}<div class="form-control mb-4"><label class="label">{{ field.label }}</label>{{ field }}{% if field.errors %}<p class="text-error text-sm">{{ field.errors.0 }}</p>{% endif %}</div>{% endfor %}
        <button type="submit" class="btn btn-primary">Create Staff</button>
    </form>
</div></div>
{% endblock %}
