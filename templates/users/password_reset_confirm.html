{% extends "base.html" %}

{% block title %}Confirm Reset — {{ platform_name }}{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary to-neutral p-4">
    <div class="card w-full max-w-md bg-base-100 shadow-2xl">
        <div class="card-body">
            <h2 class="card-title text-primary">Confirm Reset</h2>
            <form method="post">
                {% csrf_token %}
                <div class="form-control mb-4">
                    <input type="text" name="code" class="input input-bordered w-full text-center text-2xl tracking-widest" placeholder="000000" maxlength="6" required>
                </div>
                <div class="form-control mb-6">
                    <input type="password" name="new_password" class="input input-bordered w-full" placeholder="New password" minlength="8" required>
                </div>
                <button type="submit" class="btn btn-primary w-full">Reset Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
