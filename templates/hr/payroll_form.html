{% extends "base.html" %}
{% block title %}New Payroll Run — {{ platform_name }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto">
    <a href="{% url 'hr:payroll' %}" class="btn btn-ghost btn-sm mb-4">&larr; Back</a>
    <div class="page-header mb-6"><h1>New Payroll Run</h1></div>
    <div class="premium-card p-6">
        <form method="post" class="space-y-4">{% csrf_token %}
            <div class="grid grid-cols-2 gap-4">
                {% for field in form %}
                <div class="form-control">
                    <label class="label py-1"><span class="label-text font-medium">{{ field.label }}</span></label>
                    {{ field }}
                    {% if field.errors %}<p class="text-error text-sm mt-1">{{ field.errors.0 }}</p>{% endif %}
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-premium w-full">Create Payroll Run</button>
        </form>
    </div>
</div>
{% endblock %}
