{% extends "base.html" %}
{% block title %}Register Patient — {{ platform_name }}{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-primary mb-6">Patient Registration</h1>
<div class="card bg-base-100 shadow-lg max-w-3xl" x-data="{ step: 1 }">
    <div class="card-body">
        <ul class="steps steps-horizontal w-full mb-8">
            <li class="step" :class="step >= 1 && 'step-primary'">Personal Info</li>
            <li class="step" :class="step >= 2 && 'step-primary'">Contact</li>
            <li class="step" :class="step >= 3 && 'step-primary'">Medical</li>
        </ul>
        <form id="patientForm">
            <div x-show="step === 1" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="first_name" placeholder="First Name" class="input input-bordered" required>
                    <input type="text" name="last_name" placeholder="Last Name" class="input input-bordered" required>
                    <input type="text" name="cnic" placeholder="CNIC (12345-1234567-1)" class="input input-bordered" required>
                    <input type="date" name="date_of_birth" class="input input-bordered">
                    <select name="gender" class="select select-bordered"><option value="">Gender</option><option value="M">Male</option><option value="F">Female</option><option value="O">Other</option></select>
                    <select name="blood_group" class="select select-bordered"><option value="">Blood Group</option><option value="A+">A+</option><option value="B+">B+</option><option value="O+">O+</option><option value="AB+">AB+</option></select>
                </div>
                <button type="button" @click="step=2" class="btn btn-primary">Next</button>
            </div>
            <div x-show="step === 2" class="space-y-4">
                <input type="tel" name="phone" placeholder="Phone" class="input input-bordered w-full" required>
                <input type="email" name="email" placeholder="Email" class="input input-bordered w-full">
                <textarea name="address" placeholder="Address" class="textarea textarea-bordered w-full"></textarea>
                <input type="text" name="city" placeholder="City" value="Islamabad" class="input input-bordered w-full">
                <div class="flex gap-2"><button type="button" @click="step=1" class="btn btn-ghost">Back</button><button type="button" @click="step=3" class="btn btn-primary">Next</button></div>
            </div>
            <div x-show="step === 3" class="space-y-4">
                <textarea name="notes" placeholder="Notes / Allergies / Conditions" class="textarea textarea-bordered w-full"></textarea>
                <div class="flex gap-2"><button type="button" @click="step=2" class="btn btn-ghost">Back</button><button type="submit" class="btn btn-accent">Register Patient</button></div>
            </div>
        </form>
    </div>
</div>
<script>
document.getElementById('patientForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    const data = Object.fromEntries(form.entries());
    const res = await fetch('/api/v1/patients/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
        credentials: 'same-origin',
        body: JSON.stringify(data),
    });
    if (res.ok) { const p = await res.json(); window.location.href = `/patients/${p.id}/`; }
    else { alert('Registration failed. Please check all fields.'); }
});
</script>
{% endblock %}
