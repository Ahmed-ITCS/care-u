{% extends "tenants/base_public.html" %}
{% block title %}Sign In — {{ platform_name }}{% endblock %}
{% block content %}
<div class="min-h-[75vh] flex items-center justify-center px-4 py-16 bg-mesh">
    <div class="auth-card w-full max-w-md animate-slide-up">
        <div class="text-center mb-8">
            <div class="w-14 h-14 rounded-2xl bg-primary flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary/25">
                <svg class="w-7 h-7 text-primary-content" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Sign in to your hospital</h1>
            <p class="text-base-content/50 text-sm mt-2">One login for every hospital on this platform</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div class="form-control">
                <label class="label py-1"><span class="label-text font-medium">Username or Email</span></label>
                <input type="text" name="username" class="input-premium" placeholder="admin or admin@hospital.com" required autofocus autocomplete="username">
            </div>
            <div class="form-control">
                <label class="label py-1"><span class="label-text font-medium">Password</span></label>
                <input type="password" name="password" class="input-premium" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-premium w-full btn-lg">Sign In</button>
        </form>

        <p class="text-center text-sm text-base-content/50 mt-8">
            New hospital?
            <a href="{% url 'tenants:register' %}" class="text-primary font-medium hover:underline">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
