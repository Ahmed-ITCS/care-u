{% extends "base.html" %}
{% block title %}Hospital Settings{% endblock %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-primary">Hospital Settings</h1>
    <p class="text-sm text-base-content/60 mt-1">Branding, tax rate, and receipt templates for your hospital.</p>
</div>
<div class="card bg-base-100 shadow-lg max-w-2xl"><div class="card-body">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <input type="text" name="name" value="{{ config.name }}" class="input input-bordered" placeholder="Hospital Name">
            <input type="text" name="phone" value="{{ config.phone }}" class="input input-bordered" placeholder="Phone">
        </div>
        <textarea name="address" class="textarea textarea-bordered w-full mb-4" placeholder="Address">{{ config.address }}</textarea>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div><label class="label">Primary Color</label><input type="color" name="primary_color" value="{{ tenant.primary_color|default:'#1E40AF' }}"></div>
            <div><label class="label">Accent Color</label><input type="color" name="accent_color" value="{{ tenant.accent_color|default:'#059669' }}"></div>
        </div>
        <input type="number" step="0.01" name="tax_rate" value="{{ config.tax_rate }}" class="input input-bordered w-full mb-4" placeholder="Tax Rate %">
        <textarea name="receipt_header" class="textarea textarea-bordered w-full mb-2" placeholder="Receipt Header">{{ tenant.receipt_header }}</textarea>
        <textarea name="receipt_footer" class="textarea textarea-bordered w-full mb-4" placeholder="Receipt Footer">{{ tenant.receipt_footer }}</textarea>
        <button type="submit" class="btn btn-primary">Save Settings</button>
    </form>
</div></div>
{% endblock %}
