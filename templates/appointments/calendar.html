{% extends "base.html" %}
{% block title %}My Appointments — {{ platform_name }}{% endblock %}
{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
{% endblock %}
{% block content %}
<div class="page-header mb-6">
    <h1>My Appointments</h1>
    <p class="text-sm text-base-content/60">Upcoming appointments assigned to you.</p>
</div>
<div id="calendar" class="premium-card p-4"></div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const events = [
        {% for appt in appointments %}
        {
            title: '{{ appt.patient.full_name|escapejs }}',
            start: '{{ appt.scheduled_date }}T{{ appt.scheduled_time }}',
            color: '#1E40AF'
        },
        {% endfor %}
    ];
    new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGridMonth',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
        events,
        height: 'auto'
    }).render();
});
</script>
{% endblock %}
